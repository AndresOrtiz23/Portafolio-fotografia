<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Portafolio</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
    margin:0;
}

h1{
    margin:30px;
}

.galeria{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:20px;
}

img{
    width:100%;
    border-radius:12px;
    object-fit:cover;
}
</style>
</head>

<body>

<h1>Mi Portafolio Fotográfico</h1>

<div class="galeria">

<img src="fotos/paisaje1.jpg">
<img src="fotos/retrato1.jpg">
<img src="fotos/producto1.jpg">

</div>

</body>
</html>
