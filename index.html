}

h1{
    margin:0;
    font-size:2.3rem;
}

p{
    color:#cfcfcf;
    margin-top:10px;
}

.galeria{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:18px;
    padding:25px;
}

.galeria a{
    display:block;
}

.galeria img{
    width:100%;
    height:320px;
    object-fit:cover;
    border-radius:14px;
    transition:.25s;
}

.galeria img:hover{
    transform:scale(1.03);
}

footer{
    text-align:center;
    padding:25px;
    color:#aaa;
}

</style>
