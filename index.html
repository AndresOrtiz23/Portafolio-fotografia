<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio Fotográfico - Andrés Ortiz</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial, sans-serif;
    color:white;
}

header{
    text-align:center;
    padding:40px 20px;
}

h1{
    margin:0;
    font-size:2rem;
}

p{
    color:#bbb;
}

.galeria{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:18px;
    padding:20px;
}

.galeria img{
    width:100%;
    border-radius:12px;
    object-fit:cover;
    transition:0.3s;
    cursor:pointer;
}

.galeria img:hover{
    transform:scale(1.03);
}
</style>
</head>

<body>

<header>
    <h1>Portafolio Fotográfico</h1>
    <p>Andrés Ortiz</p>
</header>
